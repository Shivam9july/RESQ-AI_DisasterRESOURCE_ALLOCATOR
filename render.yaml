# Render Blueprint for the Resq backend + managed PostgreSQL database.
# Docs: https://render.com/docs/blueprint-spec
# After pushing this file, go to Render -> New -> Blueprint and select this repo.

databases:
  - name: resq-db
    databaseName: resq
    plan: free
    ipAllowList: []   # allow connections from Render services

services:
  - type: web
    name: resq-backend
    runtime: python
    plan: free
    # Build: install deps, collect static, run DB migrations.
    buildCommand: "./build.sh"
    # Start: gunicorn serving the Django WSGI app.
    startCommand: "gunicorn resq.wsgi:application --chdir backend --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    healthCheckPath: /api/health/
    healthCheckGracePeriodSeconds: 300
    autoDeploy: true
    envVars:
      - key: RESQ_DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: RESQ_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: resq-db
          property: connectionString
      # Update these after you know your deployed URLs (see DEPLOY.md).
      - key: RESQ_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: RESQ_CORS_ALLOWED_ORIGINS
        value: https://frontend-six-drab-93.vercel.app
      - key: RESQ_CSRF_TRUSTED_ORIGINS
        value: https://frontend-six-drab-93.vercel.app
